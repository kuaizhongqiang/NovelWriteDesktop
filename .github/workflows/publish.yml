name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Build frontend
        run: |
          npm install
          npm run build
        working-directory: web

      - name: Copy frontend to server
        run: cp -r web/dist server/static

      - name: Build server
        run: |
          npm install
          npm run build
        working-directory: server

      - name: Determine npm tag
        id: tag
        working-directory: server
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" == *-* ]]; then echo "NPM_TAG=alpha" >> $GITHUB_OUTPUT
          else echo "NPM_TAG=latest" >> $GITHUB_OUTPUT; fi

      - name: Publish to npm
        run: npm publish --access public --tag ${{ steps.tag.outputs.NPM_TAG }}
        working-directory: server
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify
        run: npm view novelwrite-server@${{ steps.tag.outputs.NPM_TAG }} version
